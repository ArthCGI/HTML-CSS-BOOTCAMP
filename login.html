<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login &mdash; CG Company</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <!-- Navbar -->
  <header class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">CG</div>
      <span class="logo-text">CG Company</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="btn-login active">Login</a>
    </nav>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </header>

  <!-- Login Card -->
  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-badge">CG</div>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your CG Company account</p>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" aria-label="Show password" data-target="password">&#128065;</button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <span class="form-error" id="formError"></span>

        <button type="submit" class="btn-primary btn-full">Login</button>
      </form>

      <p class="auth-switch">
        Don&rsquo;t have an account?
        <a href="register.html">Register</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="logo-icon">CG</div>
        <span>CG Company</span>
      </div>
      <nav class="footer-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
      </nav>
      <p class="footer-copy">&copy; 2026 CG Company. All rights reserved.</p>
    </div>
  </footer>

  <script src="scrpt.js"></script>
</body>
</html>
